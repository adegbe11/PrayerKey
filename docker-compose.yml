version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: prayerkey_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-prayerkey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prayerkey_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-prayerkey}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prayerkey}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prayerkey_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-prayerkey}:${POSTGRES_PASSWORD:-prayerkey_secret}@postgres:5432/${POSTGRES_DB:-prayerkey}
      NEXTAUTH_URL:         ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET}
      GROQ_API_KEY:         ${GROQ_API_KEY}
      DEEPGRAM_API_KEY:     ${DEEPGRAM_API_KEY}
      PINECONE_API_KEY:     ${PINECONE_API_KEY}
      PINECONE_INDEX:       ${PINECONE_INDEX}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_APP_URL:  ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
